services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: venura-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./storage:/var/www/storage
      - ./.env:/var/www/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - venura

  nginx:
    image: nginx:alpine
    container_name: venura-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/public
      - ./storage/app/public:/var/www/storage/app/public
    depends_on:
      - app
    networks:
      - venura

  mysql:
    image: mysql:8.0
    container_name: venura-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-venura_saas}
      MYSQL_USER: ${DB_USERNAME:-venura}
      MYSQL_PASSWORD: ${DB_PASSWORD:-venurapassword}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - venura

  redis:
    image: redis:alpine
    container_name: venura-redis
    restart: unless-stopped
    networks:
      - venura

networks:
  venura:
    driver: bridge

volumes:
  mysql_data:
